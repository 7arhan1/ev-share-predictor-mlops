name: Continuous Integration Building + Testing

on:
  push:
    branches:
      - Dev
      - Prod

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate model.pkl by running model.py
        run: |
          python3 model.py

      - name: Run Unit Tests (model tests)
        run: |
          python3 -m unittest discover tests

      - name: Run Integration Tests (Flask app tests)
        run: |
          python3 -m unittest tests.test_int