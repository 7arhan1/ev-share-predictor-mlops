name: Continuous Integration Building + Testing

on:
  push:
    branches:
      - Dev
      - Prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.8

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Generate model.pkl
      run: |
        python3 model.py

    - name: Run Unit and Integration Tests
      run: |
        python3 -m unittest tests.test_model