name: MLOps Pipeline

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build-train-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        python -m unittest discover -s tests

    - name: Train Model
      run: |
        python model.py

    - name: Deployment Placeholder (main only)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Trigger deployment to Docker Swarm or VM here."

