name: Continuous Deployment to Minikube on GCP VM

on:
  push:
    branches:
      - Prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - run: pip install -r requirements.txt

      - run: python3 model.py

      - run: python3 -m unittest discover tests

      - run: echo "✅ Tests passed"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "🚀 Starting deploy job"

      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.8

      - run: pip install -r requirements.txt

      - run: python3 model.py

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_JSON }}'

      - uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ultra-complex-453410-t3

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - run: |
          IMAGE_NAME=${{ secrets.DOCKER_HUB_USERNAME }}/ev-share-predictor
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          docker build -t $IMAGE_NAME:latest \
                       -t $IMAGE_NAME:Prod \
                       -t $IMAGE_NAME:Prod-$SHORT_SHA .

          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:Prod
          docker push $IMAGE_NAME:Prod-$SHORT_SHA

      - name: SSH and deploy
        run: |
          gcloud compute ssh testosteroneig@docker-practical1 --zone=europe-west4-b --command="
          cd /home/testosteroneig && \
          rm -rf ev-share-predictor-mlops && \
          git clone -b Prod https://github.com/7arhan1/ev-share-predictor-mlops.git && \
          cd ev-share-predictor-mlops && \
          sudo pip3 install -r requirements.txt && \
          python3 model.py && \
          cd minikube_services && \
          /usr/local/bin/minikube start --driver=docker && \
          /usr/local/bin/minikube kubectl -- delete -f ./deployment.yml || true && \
          sleep 5 && \
          /usr/local/bin/minikube kubectl -- apply -f ./deployment.yml"